<!DOCTYPE html>
<html lang="en">
  <head>
		<!-- basic -->
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Minecraft Inventory Generator | Piotr Jeleniewicz</title>
		<meta name="description" content="Build a Minecraft-style inventory from a searchable item database, choose slot positions and quantities, and preview the generated layout in your browser.">
		<meta name="author" content="Piotr Jeleniewicz">
		<meta name="robots" content="index, follow, max-image-preview:large">
		<link rel="canonical" href="https://piotrjeleniewicz.com/inventoryGen/">
		<link rel="icon" type="image/png" sizes="512x512" href="/images/favicon.png">
		<link rel="icon" type="image/png" sizes="48x48" href="/images/favicon-48.png">
		<link rel="shortcut icon" href="/favicon.ico">
		<link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
		<link rel="stylesheet" type="text/css" href="style.css"/>
	</head>
  <body>
    <!--lib -->
      <script src="js/lib/math.js"></script>
      <script src="js/lib/jquery-3.6.0.min.js"></script>
    <!--rest -->
      <script type="text/javascript" src="js/search.js"></script>
      <script type="text/javascript" src="js/java.js"></script>
      <script type="text/javascript" src="js/gen.js"></script> 
      <div class="Main">
        <div id="mcBlock">
          <h1 id="h1">Game Inventory Generator</h1>
          <h3>Input number of slots</h3>
        </div>
        <div class="noi">
          <input type="input" class="noiField" min="1" max="1080" onkeyup="genDivs()" placeholder="Name" id="name" autocomplete="off" required/>
          <label for="name" class="noiLabel">Number of Items</label>
        </div>
        <div class="sr" id="srd">
          <div id="dis">
            <img id="stream" alt="Selected Minecraft item preview">
          </div>
          <input type="input" class="srField" id="search" onkeyup="searchDB(this); fade(this)" placeholder="Name1" autocomplete="off" required/>
          <label class="srLabel">Add item</label>
          <div id="resize">
            <div id="slotd">
              <label id="slot">Slot</label>
              <input type="number" id="sloti" min="1" max="0">
          </div>
          <div id="amntd">
            <label id="amnt">Amount</label>
            <input type="number" id="amnti" min="1" max="0">
          </div>
            <button class="buttoff" id="add" onclick="placeItem()">Add</button>
            <button class="buttoff" id ="rem" onclick="removeItem()">Remove</button>
            <button class="buttoff" id="clr" onclick="clearAll()">Clear</button>
          </div>
        </div>	
      </div>	
        <div id="code">
          <div id="inv">
          </div>
        </div>
  </body>
</html>
